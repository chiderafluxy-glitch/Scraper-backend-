# Render Blueprint
# Deploy scraper as a background worker on Render

services:
  # Scraper Worker
  - name: scraper-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm run scraper
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SCRAPER_INTERVAL
        value: "3600"  # Run every hour

  # Cron Job for Scraper
  - name: scraper-cron
    cronSchedule: "0 */6 * * *"  # Every 6 hours
    maxRetries: 3
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm run scrape:mutual-of-omaha -- --full
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # Normalization Cron Job
  - name: normalize-cron
    cronSchedule: "30 */2 * * *"  # Every 2 hours
    maxRetries: 3
    buildCommand: npm install
    startCommand: npm run normalize -- --full
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
