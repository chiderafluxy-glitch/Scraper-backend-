# Render Blueprint
# Deploy scraper on Render

services:
  # Scraper Worker - HTTP server + continuous scraper with lock
  - name: scraper-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx playwright install --with-deps chromium
    startCommand: npm run scraper
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"  # Install browsers to node_modules, not OS cache
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # Normalization Cron Job
  - name: normalize-cron
    cronSchedule: "30 */2 * * *"  # Every 2 hours
    maxRetries: 3
    buildCommand: npm install
    startCommand: npm run normalize -- --full
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
